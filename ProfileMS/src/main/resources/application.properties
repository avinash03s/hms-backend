spring.application.name=PROFILEMS
server.port=9100

spring.datasource.url=jdbc:postgresql://localhost:5432/hms_profile_db
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

spring.output.ansi.enabled=ALWAYS
logging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr(%5p) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} : %m%n



DOCTOR_ALREADY_EXITS=Doctor Already Exits
DOCTOR_NOT_FOUND=Doctor Not Found

PATIENT_ALREADY-EXITS= Patient Already Exits
PATIENT_NOT_FOUND= Patient Not Found
